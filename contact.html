<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | DROE Fermentation Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="imagenes/logos/droe2.png">
</head>

<body>

    <header id="main-nav"></header>

    <main>
        <section class="intro-section">
            <span class="subtitle">Get in Touch</span>
            <h1>Let's Connect</h1>
            <p>Whether you have questions about our fermentation process or want to place a custom order, we are here to
                help.</p>
        </section>

        <section class="contact-container">
            <div class="contact-method-quick">
                <h3>Quick Inquiry</h3>
                <p>For immediate assistance or stock availability, chat with the lab technician directly.</p>
                <a href="https://wa.me/+351935356879" class="btn-whatsapp" target="_blank">
                    <span>Message on WhatsApp</span>
                </a>
            </div>

            <div class="contact-form-wrapper">
                <h3>Send an Email</h3>
                <form action="#" class="contact-form">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" placeholder="Your name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" rows="5" placeholder="How can the lab help you today?"
                            required></textarea>
                    </div>
                    <button type="submit" class="btn-primary">Send Message</button>
                </form>
            </div>
        </section>
    </main>

    <footer id="main-footer"></footer>

    <script src="scripts.js"></script>

</body>

</html>
